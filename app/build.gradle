 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

def javafxVersion = '21.0.3'

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation libs.junit

    // This dependency is used by the application.
    implementation libs.guava
    implementation 'com.google.code.gson:gson:2.11.0'
    implementation "org.openjfx:javafx-controls:${javafxVersion}"
    
    // LangChain4j for AI services and Function Calling
    implementation 'dev.langchain4j:langchain4j:1.12.2'
    implementation 'dev.langchain4j:langchain4j-open-ai:1.12.2'
    
    // Source: https://mvnrepository.com/artifact/org.fxmisc.richtext/richtextfx
    implementation group: 'org.fxmisc.richtext', name: 'richtextfx', version: '0.11.7'
    // Logging: SLF4J 2.x API + Log4j2 implementation (console encoder charset set via log4j2.xml)
    implementation 'org.apache.logging.log4j:log4j-slf4j2-impl:2.20.0'
    implementation 'org.apache.logging.log4j:log4j-core:2.20.0'
    implementation 'org.apache.logging.log4j:log4j-api:2.20.0'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    // ソースコード内の日本語文字列を正しく扱うため、コンパイル時の文字コードを固定する
    options.encoding = 'UTF-8'
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
    // Force Windows console friendly encoding at JVM startup
    applicationDefaultJvmArgs = [
        '-Dfile.encoding=UTF-8'
    ]
}

// 依存jarを build/libs/runtime ディレクトリにコピーするタスク
task copyRuntimeLibs(type: Copy) {
    from configurations.runtimeClasspath
    into layout.buildDirectory.dir('libs/runtime')
    exclude 'app.jar'
}

// dist/ 配下に配布物を組み立てるタスク
task createDist(type: Copy, dependsOn: [build, copyRuntimeLibs]) {
    def distDir = rootProject.layout.projectDirectory.dir('dist')

    // app.jar
    from(layout.buildDirectory.file('libs/app.jar')) {
        into 'lib'
    }
    // 依存jar
    from(layout.buildDirectory.dir('libs/runtime')) {
        into 'lib'
        include '*.jar'
    }
    // 起動バッチ（事前作成済み）
    from(layout.projectDirectory.file('run.bat'))

    into distDir
}
